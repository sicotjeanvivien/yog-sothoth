# Static quality checks for the /web Next.js package.
# Runs typecheck, lint and unit tests as parallel jobs so a failure
# in one does not mask issues in the others.

name: web-quality

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web-quality.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-quality.yml"

# Cancel any in-flight run for the same ref when a new commit lands.
# Saves CI minutes during rapid push cycles on PR branches.
concurrency:
  group: web-quality-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: web

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

  test:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test