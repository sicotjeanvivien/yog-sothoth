# Quality checks for the Rust workspace.
#
# Five jobs in parallel:
#   - check    : `cargo check` across the whole workspace (catches
#                anything that doesn't compile, including the WASM
#                crate's host build).
#   - fmt      : `cargo fmt --check`.
#   - clippy   : `cargo clippy` over the native crates (WASM target
#                still disabled until v0.3).
#   - test     : `cargo test` over the native crates.
#   - audit    : `cargo audit` on Cargo.lock — vulnerability scan of
#                the dependency tree.
#
# Rust version is pinned by /rust-toolchain.toml — `dtolnay/rust-toolchain@stable`
# reads it automatically, so we never silently inherit a moving target.

name: crates

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/audit.toml"
      - ".github/workflows/crates.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".cargo/audit.toml"
      - ".github/workflows/crates.yml"

# Cancel any in-flight run for the same ref when a new commit lands.
concurrency:
  group: crates-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # The .sqlx/ folder is committed; `sqlx::query*!` macros validate
  # against those snapshots instead of needing a live database.
  SQLX_OFFLINE: "true"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `cargo check --workspace` covers every member (yog-core,
      # yog-persistence, yog-indexer, yog-api, yog-context, yog-wasm)
      # without listing them. New crates are picked up automatically.
      - run: cargo check --workspace --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Native crates only — the WASM crate is a scaffold until v0.3
      # (kept compiling via `check --workspace` above, but not
      # clippy-linted to avoid churn from `wasm-bindgen`-emitted code).
      - run: |
          cargo clippy \
            -p yog-api \
            -p yog-core \
            -p yog-context \
            -p yog-indexer \
            -p yog-persistence \
            --all-targets --all-features \
            -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo test \
            -p yog-api \
            -p yog-core \
            -p yog-context \
            -p yog-indexer \
            -p yog-persistence \

  # ─────────────────────────────────────────────────────────────────
  # test-integration — DB-backed tests behind the integration-tests
  # feature. Kept separate from `test` so the pure unit tests stay
  # fast and DB-free; only this job pays the Postgres setup cost.
  # ─────────────────────────────────────────────────────────────────
  test-integration:
    name: Test (integration, DB)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: yog
          POSTGRES_PASSWORD: yog
          POSTGRES_DB: yog_sothoth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yog -d yog_sothoth"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Admin connection: these tests exercise query correctness, not
      # the runtime privilege model. sqlx::test uses this URL to spin
      # up an isolated database per test.
      DATABASE_URL: postgresql://yog:yog@localhost:5432/yog_sothoth

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Roles: migration 001 emits GRANTs against the runtime roles; create
      # them as bare login roles so the migration applies. sqlx::test re-runs
      # migrations per test database, so the roles must exist at the cluster
      # level (they do — roles are cluster-wide, not per-database).
      #
      # max_background_workers = 0: sqlx::test creates a fresh database per
      # test, each replaying migrations 010–013 which add continuous-aggregate
      # refresh policies. The TimescaleDB job scheduler (a background worker)
      # then mutates the cluster-wide _timescaledb_catalog asynchronously,
      # racing the next test's cagg-creating migration DDL and failing it with
      # "tuple concurrently deleted" (XX000). Disabling the scheduler removes
      # the only concurrent writer; real-time aggregation still serves reads.
      # The GUC is postmaster-context, so it needs a restart to take effect.
      - name: Pre-create runtime roles and disable TimescaleDB scheduler
        env:
          PGPASSWORD: yog
        run: |
          psql -h localhost -U yog -d yog_sothoth -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE yog_migrate;
          CREATE ROLE yog_indexer;
          CREATE ROLE yog_api;
          CREATE ROLE yog_context;
          ALTER SYSTEM SET timescaledb.max_background_workers = 0;
          SQL
          docker restart "${{ job.services.postgres.id }}"
          for _ in $(seq 1 30); do
            pg_isready -h localhost -U yog -d yog_sothoth && break
            sleep 1
          done
          test "$(psql -h localhost -U yog -d yog_sothoth -tAc \
            'SHOW timescaledb.max_background_workers;')" = "0"

      - name: Run integration tests
        run: |
          cargo test \
            -p yog-persistence \
            --features integration-tests \
            -- --include-ignored

  audit:
    name: Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/audit@v1
        name: Audit Rust Dependencies
        
  # ─────────────────────────────────────────────────────────────────
  # sqlx-check — verify .sqlx/ snapshots are up to date
  # ─────────────────────────────────────────────────────────────────
  # The `query!()` macros are validated at compile time against the
  # `.sqlx/` offline metadata (committed). When a query is added or
  # modified, the developer must regenerate `.sqlx/` locally with
  # `cargo sqlx prepare` and commit the result. This job ensures that
  # step is never forgotten: it spins up a real Postgres in CI,
  # applies the migrations, and compares what the macros WOULD
  # produce against what `.sqlx/` actually contains.
  sqlx-check:
    name: SQLx check
    runs-on: ubuntu-latest
 
    # TimescaleDB image because migration 001 creates the timescaledb
    # extension and promotes tables to hypertables — a vanilla
    # postgres image would fail the migration.
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: yog
          POSTGRES_PASSWORD: yog
          POSTGRES_DB: yog_sothoth
        ports:
          - 5432:5432
        # Health check so the next step waits for Postgres to be
        # ready before applying migrations.
        options: >-
          --health-cmd "pg_isready -U yog -d yog_sothoth"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
 
    env:
      # The job connects directly as the admin user (no role split
      # in CI — we are only checking query metadata, not exercising
      # the runtime privilege model).
      DATABASE_URL: postgresql://yog:yog@localhost:5432/yog_sothoth
 
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
 
      # sqlx-cli provides `cargo sqlx prepare --check` and
      # `cargo sqlx migrate run`. --locked uses Cargo.lock to avoid
      # surprise updates; the postgres feature is the only one we
      # need (no MySQL / SQLite drivers compiled in).
      - name: Install sqlx-cli
        run: |
          cargo install sqlx-cli \
            --version 0.8.6 \
            --no-default-features \
            --features postgres,rustls \
            --locked
 
      # The CI Postgres has no yog_migrate / yog_indexer / yog_api /
      # yog_context roles — the migrations 001 emit GRANT statements
      # against them, which would fail. Create them as bare login
      # roles (no passwords needed; CI is ephemeral).
      #
      # max_background_workers = 0: migrations 010–013 add continuous-
      # aggregate refresh policies, after which the TimescaleDB job
      # scheduler (a background worker) starts mutating the cluster-wide
      # _timescaledb_catalog asynchronously, racing the very next cagg
      # migration's DDL and failing it with "tuple concurrently deleted"
      # (migration 14, intermittently). The test-integration job already
      # disables the scheduler for the same reason; this job needs it too
      # because it applies the same migrations. The GUC is postmaster-
      # context, so it needs a restart to take effect.
      - name: Pre-create runtime roles and disable TimescaleDB scheduler
        env:
          PGPASSWORD: yog
        run: |
          psql -h localhost -U yog -d yog_sothoth -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE yog_migrate;
          CREATE ROLE yog_indexer;
          CREATE ROLE yog_api;
          CREATE ROLE yog_context;
          ALTER SYSTEM SET timescaledb.max_background_workers = 0;
          SQL
          docker restart "${{ job.services.postgres.id }}"
          for _ in $(seq 1 30); do
            pg_isready -h localhost -U yog -d yog_sothoth && break
            sleep 1
          done
          test "$(psql -h localhost -U yog -d yog_sothoth -tAc \
            'SHOW timescaledb.max_background_workers;')" = "0"
 
      # Apply migrations in the same shape the runtime does, using
      # the standard sqlx CLI command. yog-migrate is the binary
      # form of this same call — we do not build it here because
      # the other jobs already cover it.
      - name: Apply migrations
        run: |
          cargo sqlx migrate run \
            --source crates/persistence/migrations
 
      # The real check: does `.sqlx/` reflect the queries that the
      # macros in the source code currently produce, against the
      # schema we just applied? --check exits non-zero if not.
      - name: Verify .sqlx/ is up to date
        run: |
          cd crates/persistence
          cargo sqlx prepare --check -- --tests
 
  # ── Disabled until v0.3 (WASM activation deferred) ────────────────
