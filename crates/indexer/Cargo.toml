[package]
name = "indexer"
version = "0.1.0"
edition = "2021"

[dependencies]
yog-core = { path = "../core" }

# Runtime async
tokio = { version = "1", features = ["full"] }

# WebSocket
tokio-tungstenite = { version = "0.29", features = ["native-tls"] }
tokio-retry = "0.3"

futures-util = "0.3"

# RPC Solana
solana-client = "3"
solana-commitment-config = "3"
solana-pubsub-client = "3"
solana-sdk = "3"
solana-transaction-status = "3"

# Database
sqlx = { version = "0.8", features = [
  "postgres",
  "runtime-tokio-native-tls",
  "chrono",
] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Logs
tracing = "0.1"
tracing-subscriber = "0.3"

# Environment variables
dotenvy = "0.15"

# Errors
thiserror = "2"
anyhow = "1"

chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"
